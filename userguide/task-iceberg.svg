<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480" style="font-family: -apple-system, 'SF Pro Text', Helvetica, sans-serif;">

  <!-- Background -->
  <rect width="560" height="480" fill="#F8F7F4"/>

  <!-- ── WATER ── -->
  <!-- Water body -->
  <rect x="0" y="210" width="560" height="270" fill="#0F3A52" opacity="0.92"/>

  <!-- Waterline subtle shimmer -->
  <rect x="0" y="207" width="560" height="6" fill="#1A6B8A" opacity="0.4"/>
  <line x1="0" y1="210" x2="560" y2="210" stroke="#1A9882" stroke-width="1.5" opacity="0.7"/>

  <!-- ── ICEBERG ABOVE WATER ── -->
  <!-- Above-water tip — small, bright -->
  <polygon points="280,42 226,210 334,210" fill="#1A9882"/>
  <!-- Subtle facet -->
  <polygon points="280,42 280,140 334,210" fill="#0F6E56" opacity="0.35"/>

  <!-- ── ICEBERG BELOW WATER ── -->
  <!-- Main underwater mass — much larger -->
  <polygon points="226,210 160,290 148,380 192,440 368,440 412,380 400,290 334,210" fill="#0B2E42"/>
  <!-- Depth shading facets -->
  <polygon points="226,210 160,290 190,370 280,395 280,210" fill="#0D3548" opacity="0.5"/>
  <polygon points="334,210 400,290 370,370 280,395 280,210" fill="#071E2E" opacity="0.4"/>

  <!-- ── WATERLINE LABEL ── -->
  <line x1="40" y1="210" x2="130" y2="210" stroke="#1A9882" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="430" y1="210" x2="520" y2="210" stroke="#1A9882" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="280" y="206" text-anchor="middle" fill="#1A9882" font-size="11" font-weight="600" letter-spacing="0.08em" opacity="0.8">WATERLINE</text>

  <!-- ── ABOVE WATER LABEL ── -->
  <!-- Bracket line from tip -->
  <line x1="334" y1="126" x2="390" y2="126" stroke="#1C1C1E" stroke-width="1" opacity="0.35"/>
  <line x1="390" y1="126" x2="390" y2="126" stroke="#1C1C1E" stroke-width="1" opacity="0.35"/>

  <text x="396" y="116" fill="#1C1C1E" font-size="13" font-weight="700" letter-spacing="-0.2px">The event</text>
  <text x="396" y="133" fill="#555" font-size="11" font-weight="400">What you planned for</text>

  <!-- Small visible indicator -->
  <circle cx="390" cy="126" r="3" fill="#1A9882"/>

  <!-- ── BELOW WATER LAYERS ── -->

  <!-- Layer dividers (subtle) -->
  <line x1="168" y1="278" x2="392" y2="278" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="157" y1="340" x2="403" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="162" y1="395" x2="398" y2="395" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Layer 1: Preparation -->
  <text x="280" y="254" text-anchor="middle" fill="rgba(255,255,255,0.90)" font-size="13" font-weight="600" letter-spacing="-0.1px">Preparation</text>
  <text x="280" y="270" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">Getting ready · reviewing · gathering</text>

  <!-- Layer 2: Travel there -->
  <text x="280" y="308" text-anchor="middle" fill="rgba(255,255,255,0.90)" font-size="13" font-weight="600" letter-spacing="-0.1px">Travel there</text>
  <text x="280" y="324" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">Including buffer for the unexpected</text>

  <!-- Layer 3: Travel back -->
  <text x="280" y="362" text-anchor="middle" fill="rgba(255,255,255,0.90)" font-size="13" font-weight="600" letter-spacing="-0.1px">Travel back</text>
  <text x="280" y="378" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">Often forgotten entirely</text>

  <!-- Layer 4: Follow-up -->
  <text x="280" y="414" text-anchor="middle" fill="rgba(255,255,255,0.90)" font-size="13" font-weight="600" letter-spacing="-0.1px">Follow-up</text>
  <text x="280" y="430" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">Notes · tasks created · commitments made</text>

  <!-- ── LEFT ANNOTATION: what you see vs what's real ── -->
  <!-- Brace above water -->
  <line x1="96" y1="42" x2="96" y2="210" stroke="#1A9882" stroke-width="1.5" opacity="0.5"/>
  <line x1="91" y1="42" x2="101" y2="42" stroke="#1A9882" stroke-width="1.5" opacity="0.5"/>
  <line x1="91" y1="210" x2="101" y2="210" stroke="#1A9882" stroke-width="1.5" opacity="0.5"/>
  <text x="88" y="122" text-anchor="middle" fill="#1A9882" font-size="11" font-weight="600" transform="rotate(-90, 88, 122)" opacity="0.8">VISIBLE</text>

  <!-- Brace below water -->
  <line x1="72" y1="216" x2="72" y2="438" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="67" y1="216" x2="77" y2="216" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="67" y1="438" x2="77" y2="438" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="64" y="322" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="600" transform="rotate(-90, 64, 322)" letter-spacing="0.05em">HIDDEN</text>

</svg>
